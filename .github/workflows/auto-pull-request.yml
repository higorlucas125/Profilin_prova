name: Auto Pull Request

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pull-request:
    name: Open PR to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          existing=$(gh pr list --head "$BRANCH" --base main --json number --jq 'length')
          if [ "$existing" -gt "0" ]; then
            echo "PR already exists for branch '$BRANCH' → skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$BRANCH" \
            --body "Pull request gerado automaticamente a partir da branch \`$BRANCH\`."
